<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <rect width="64" height="64" rx="12" fill="#0D1117"/>
  <rect width="64" height="64" rx="12" fill="none" stroke="#21262D" stroke-width="1"/>
  <!-- Radar rings -->
  <circle cx="32" cy="32" r="5" fill="#00FF87"/>
  <circle cx="32" cy="32" r="13" fill="none" stroke="#0095FF" stroke-width="1.2" stroke-dasharray="4 2" opacity="0.7"/>
  <circle cx="32" cy="32" r="22" fill="none" stroke="#00FF87" stroke-width="0.8" opacity="0.4"/>
  <!-- Sweep line frozen at angle -->
  <line x1="32" y1="32" x2="52" y2="18" stroke="#00FF87" stroke-width="2" opacity="0.9" stroke-linecap="round"/>
  <!-- Blip -->
  <circle cx="50" cy="20" r="2.5" fill="#00FF87" opacity="0.9"/>
  <!-- Bracket left -->
  <text x="2" y="46" font-family="monospace" font-size="18" font-weight="700" fill="#484F58">[</text>
  <!-- MA initials -->
  <text x="14" y="46" font-family="monospace" font-size="13" font-weight="700" fill="#00FF87">M</text>
  <text x="27" y="46" font-family="monospace" font-size="13" font-weight="700" fill="#8B949E">A</text>
  <!-- Bracket right -->
  <text x="42" y="46" font-family="monospace" font-size="18" font-weight="700" fill="#484F58">]</text>
</svg>
